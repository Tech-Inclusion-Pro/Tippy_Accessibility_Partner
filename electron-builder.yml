appId: com.techinclusion.tippy
productName: TIPPY - Accessibility Partner
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,.prettierignore,.prettierrc.yaml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
  - out/main/data/**
win:
  executableName: tippy-desktop
  icon: build/icon.ico
  target:
    - nsis
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  category: public.app-category.education
  icon: build/icon.icns
  target:
    - dmg
    - zip
  notarize: false
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  target:
    - AppImage
    - deb
  maintainer: Tech Inclusion Pro
  category: Education
  icon: build/icon.png
appImage:
  artifactName: ${name}-${version}-${arch}.${ext}
extraResources:
  - from: data/
    to: data/
npmRebuild: true
publish:
  provider: generic
  url: https://example.com/auto-updates
